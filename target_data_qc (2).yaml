      - check_id: 14
        check_type: concept_domain
        check_name: concept_domain_validation
        check_query: |
          WITH TABLE_COUNTS AS (

              SELECT 'TUMOR_EPISODE' AS TABLE_NAME, COUNT(*) AS TOTAL_RECORDS
              FROM tgt_tbl_60

              UNION ALL
              SELECT 'TUMOR_DIAGNOSIS', COUNT(*)
              FROM tgt_tbl_61

              UNION ALL
              SELECT 'TUMOR_TREATMENT', COUNT(*)
              FROM tgt_tbl_62

              UNION ALL
              SELECT 'PATHOLOGY_OCCURRENCE', COUNT(*)
              FROM tgt_tbl_63

              UNION ALL
              SELECT 'CANCER_MODIFIER', COUNT(*)
              FROM tgt_tbl_64

              UNION ALL
              SELECT 'GENOMIC_MEASUREMENT', COUNT(*)
              FROM tgt_tbl_65

              UNION ALL
              SELECT 'BIOMARKER_DETAIL', COUNT(*)
              FROM tgt_tbl_66
          ),

          CHECK_RESULTS AS (

              -- TUMOR_EPISODE: episode_concept_id should be Episode domain
              SELECT
                  'TUMOR_EPISODE' AS TABLE_NAME,
                  'EPISODE_CONCEPT_ID' AS COLUMN_NAME,
                  COUNT(*) AS FAILED_RECORDS
              FROM tgt_tbl_60 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.EPISODE_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.EPISODE_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) != 'EPISODE'
                    )

              UNION ALL

              -- TUMOR_DIAGNOSIS: condition_concept_id should be Condition domain
              SELECT
                  'TUMOR_DIAGNOSIS',
                  'CONDITION_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_61 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.CONDITION_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.CONDITION_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) != 'CONDITION'
                    )

              UNION ALL

              -- TUMOR_DIAGNOSIS: topography_concept_id should be Spec Anatomic Site or Observation
              SELECT
                  'TUMOR_DIAGNOSIS',
                  'TOPOGRAPHY_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_61 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.TOPOGRAPHY_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.TOPOGRAPHY_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) NOT IN ('SPEC ANATOMIC SITE', 'OBSERVATION')
                    )

              UNION ALL

              -- TUMOR_DIAGNOSIS: morphology_concept_id domain check
              SELECT
                  'TUMOR_DIAGNOSIS',
                  'MORPHOLOGY_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_61 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.MORPHOLOGY_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.MORPHOLOGY_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) NOT IN ('OBSERVATION', 'MEASUREMENT', 'CONDITION')
                    )

              UNION ALL

              -- TUMOR_TREATMENT: treatment_concept_id should be Procedure, Drug, or Regimen
              SELECT
                  'TUMOR_TREATMENT',
                  'TREATMENT_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_62 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.TREATMENT_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.TREATMENT_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) NOT IN ('PROCEDURE', 'DRUG', 'REGIMEN')
                    )

              UNION ALL

              -- TUMOR_TREATMENT: route_concept_id should be Route domain
              SELECT
                  'TUMOR_TREATMENT',
                  'ROUTE_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_62 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.ROUTE_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.ROUTE_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) != 'ROUTE'
                    )

              UNION ALL

              -- PATHOLOGY_OCCURRENCE: pathology_concept_id should be Measurement or Observation
              SELECT
                  'PATHOLOGY_OCCURRENCE',
                  'PATHOLOGY_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_63 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.PATHOLOGY_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.PATHOLOGY_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) NOT IN ('MEASUREMENT', 'OBSERVATION')
                    )

              UNION ALL

              -- CANCER_MODIFIER: modifier_concept_id domain check
              SELECT
                  'CANCER_MODIFIER',
                  'MODIFIER_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_64 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.MODIFIER_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.MODIFIER_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) NOT IN ('OBSERVATION', 'MEASUREMENT', 'MODIFIER')
                    )

              UNION ALL

              -- GENOMIC_MEASUREMENT: measurement_concept_id should be Measurement
              SELECT
                  'GENOMIC_MEASUREMENT',
                  'MEASUREMENT_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_65 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.MEASUREMENT_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.MEASUREMENT_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) != 'MEASUREMENT'
                    )

              UNION ALL

              -- GENOMIC_MEASUREMENT: gene_concept_id domain check
              SELECT
                  'GENOMIC_MEASUREMENT',
                  'GENE_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_65 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.GENE_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.GENE_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) NOT IN ('MEASUREMENT', 'OBSERVATION', 'GENOMIC')
                    )

              UNION ALL

              -- BIOMARKER_DETAIL: biomarker_detail_concept_id domain check
              SELECT
                  'BIOMARKER_DETAIL',
                  'BIOMARKER_DETAIL_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_66 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.BIOMARKER_DETAIL_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.BIOMARKER_DETAIL_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) NOT IN ('MEASUREMENT', 'OBSERVATION')
                    )

              UNION ALL

              -- BIOMARKER_DETAIL: test_type_concept_id domain check
              SELECT
                  'BIOMARKER_DETAIL',
                  'TEST_TYPE_CONCEPT_ID',
                  COUNT(*)
              FROM tgt_tbl_66 t
              LEFT JOIN pre_req_tbl_1 c
                  ON t.TEST_TYPE_CONCEPT_ID = c.CONCEPT_ID
              WHERE t.TEST_TYPE_CONCEPT_ID IS NOT NULL
                AND (
                      c.CONCEPT_ID IS NULL
                      OR UPPER(c.DOMAIN_ID) NOT IN ('TYPE CONCEPT', 'MEASUREMENT')
                    )
          )

          SELECT
              C.TABLE_NAME,
              C.COLUMN_NAME,
              T.TOTAL_RECORDS,
              C.FAILED_RECORDS,
              CASE
                  WHEN T.TOTAL_RECORDS = 0 THEN 'NO DATA'
                  WHEN C.FAILED_RECORDS > 0 THEN 'FAIL'
                  ELSE 'PASS'
              END AS STATUS,
              CASE
                  WHEN T.TOTAL_RECORDS = 0
                      THEN 'Validation not applicable because oncology table is empty'
                  WHEN C.FAILED_RECORDS > 0
                      THEN 'Concept_id is missing from CONCEPT table or belongs to invalid domain'
                  ELSE 'Table has data and all non-zero concept_ids belong to expected domain'
              END AS VALIDATION_NOTE,
              'CONCEPT DOMAIN CHECK' AS CHECK_TYPE
          FROM CHECK_RESULTS C
          JOIN TABLE_COUNTS T
              ON C.TABLE_NAME = T.TABLE_NAME
          ORDER BY
              C.TABLE_NAME,
              C.COLUMN_NAME;

