            ('BIOMARKER_DETAIL','FLEXI_COLUMN_4','string'),
            ('BIOMARKER_DETAIL','FLEXI_COLUMN_5','string')
            ) AS t(TABLE_NAME, COLUMN_NAME, EXPECTED_TYPE)
          ),

          ACTUAL_SCHEMA AS (
            SELECT
              UPPER(TABLE_NAME) AS TABLE_NAME,
              UPPER(COLUMN_NAME) AS COLUMN_NAME,
              UPPER(DATA_TYPE) AS DATA_TYPE
            FROM DVMT_RWPL.INFORMATION_SCHEMA.COLUMNS
            WHERE UPPER(TABLE_SCHEMA) = 'MARKETSCAN_COMMERCIAL_CDM_2026Q1_INT'
              AND UPPER(TABLE_NAME) IN (
                'PERSON','OBSERVATION_PERIOD','VISIT_OCCURRENCE','VISIT_DETAIL',
                'CONDITION_OCCURRENCE','DRUG_EXPOSURE','PROCEDURE_OCCURRENCE',
                'DEVICE_EXPOSURE','MEASUREMENT','OBSERVATION','DEATH',
                'LOCATION','CARE_SITE','PROVIDER','PAYER_PLAN_PERIOD','COST',
                'DRUG_ERA','CONDITION_ERA','DOSE_ERA','CDM_SOURCE','METADATA',
                'CLAIM_DETAIL','SOURCE_TO_CONCEPT_MAP',
                'NOTE','NOTE_NLP','SPECIMEN','FACT_RELATIONSHIP',
                'EPISODE','EPISODE_EVENT','COHORT','COHORT_DEFINITION',
                'TUMOR_EPISODE','TUMOR_DIAGNOSIS','TUMOR_TREATMENT',
                'PATHOLOGY_OCCURRENCE','CANCER_MODIFIER','GENOMIC_MEASUREMENT',
                'BIOMARKER_DETAIL'
              )
          )

          SELECT
            e.TABLE_NAME,
            e.COLUMN_NAME,
            e.EXPECTED_TYPE,
            COALESCE(a.DATA_TYPE, 'COLUMN_NOT_FOUND') AS DATA_TYPE,
            CASE
              -- bigint: accept BIGINT, LONG
              WHEN UPPER(e.EXPECTED_TYPE) = 'BIGINT'
                AND a.DATA_TYPE IN ('BIGINT','LONG') THEN 'PASS'
              -- int: accept INT, INTEGER, SMALLINT, TINYINT
              WHEN UPPER(e.EXPECTED_TYPE) = 'INT'
                AND a.DATA_TYPE IN ('INT','INTEGER','SMALLINT','TINYINT') THEN 'PASS'
              -- float: accept FLOAT, DOUBLE, DECIMAL
              WHEN UPPER(e.EXPECTED_TYPE) = 'FLOAT'
                AND a.DATA_TYPE IN ('FLOAT','DOUBLE','DECIMAL') THEN 'PASS'
              -- string: accept STRING, VARCHAR, CHAR, TEXT
              WHEN UPPER(e.EXPECTED_TYPE) = 'STRING'
                AND a.DATA_TYPE IN ('STRING','VARCHAR','CHAR','TEXT') THEN 'PASS'
              -- date
              WHEN UPPER(e.EXPECTED_TYPE) = 'DATE'
                AND a.DATA_TYPE = 'DATE' THEN 'PASS'
              -- timestamp
              WHEN UPPER(e.EXPECTED_TYPE) = 'TIMESTAMP'
                AND a.DATA_TYPE IN ('TIMESTAMP','TIMESTAMP_NTZ','TIMESTAMP_LTZ') THEN 'PASS'
              -- boolean
              WHEN UPPER(e.EXPECTED_TYPE) = 'BOOLEAN'
                AND a.DATA_TYPE IN ('BOOLEAN','BOOL') THEN 'PASS'
              -- column not found in actual schema
              WHEN a.DATA_TYPE IS NULL THEN 'FAIL'
              ELSE 'FAIL'
            END AS STATUS,
            CASE
              WHEN a.DATA_TYPE IS NULL THEN 'Column not found in actual table'
              WHEN UPPER(e.EXPECTED_TYPE) = 'BIGINT' AND a.DATA_TYPE NOT IN ('BIGINT','LONG')
                THEN 'Expected BIGINT but found ' || a.DATA_TYPE
              WHEN UPPER(e.EXPECTED_TYPE) = 'INT' AND a.DATA_TYPE NOT IN ('INT','INTEGER','SMALLINT','TINYINT')
                THEN 'Expected INT but found ' || a.DATA_TYPE
              WHEN UPPER(e.EXPECTED_TYPE) = 'FLOAT' AND a.DATA_TYPE NOT IN ('FLOAT','DOUBLE','DECIMAL')
                THEN 'Expected FLOAT but found ' || a.DATA_TYPE
              WHEN UPPER(e.EXPECTED_TYPE) = 'STRING' AND a.DATA_TYPE NOT IN ('STRING','VARCHAR','CHAR','TEXT')
                THEN 'Expected STRING but found ' || a.DATA_TYPE
              WHEN UPPER(e.EXPECTED_TYPE) = 'DATE' AND a.DATA_TYPE != 'DATE'
                THEN 'Expected DATE but found ' || a.DATA_TYPE
              WHEN UPPER(e.EXPECTED_TYPE) = 'TIMESTAMP' AND a.DATA_TYPE NOT IN ('TIMESTAMP','TIMESTAMP_NTZ','TIMESTAMP_LTZ')
                THEN 'Expected TIMESTAMP but found ' || a.DATA_TYPE
              WHEN UPPER(e.EXPECTED_TYPE) = 'BOOLEAN' AND a.DATA_TYPE NOT IN ('BOOLEAN','BOOL')
                THEN 'Expected BOOLEAN but found ' || a.DATA_TYPE
              ELSE NULL
            END AS REASON,
            'DATA TYPE VALIDATION' AS CHECK_TYPE
          FROM EXPECTED e
          LEFT JOIN ACTUAL_SCHEMA a
            ON UPPER(e.TABLE_NAME) = a.TABLE_NAME
            AND UPPER(e.COLUMN_NAME) = a.COLUMN_NAME
          ORDER BY e.TABLE_NAME, e.COLUMN_NAME;
      - check_id: 2
        check_type: duplication
        check_name: duplicate_record_detection
        check_query: |
          -- PERSON
          SELECT 'PERSON' AS TABLE_NAME,
            COUNT(*) AS DUPLICATION_COUNT,
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END AS STATUS,
            'DUPLICATE CHECK (EXCLUDING PRIMARY KEY)' AS CHECK_TYPE
          FROM (
            SELECT * EXCEPT(PERSON_ID)
            FROM tgt_tbl_24
            GROUP BY ALL HAVING COUNT(*) > 1
          )

          UNION ALL

          -- OBSERVATION_PERIOD
          SELECT 'OBSERVATION_PERIOD',
            COUNT(*),
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'DUPLICATE CHECK (EXCLUDING PRIMARY KEY)' AS CHECK_TYPE
          FROM (
            SELECT * EXCEPT(OBSERVATION_PERIOD_ID)
            FROM tgt_tbl_25
            GROUP BY ALL HAVING COUNT(*) > 1
          )

          UNION ALL

          -- VISIT_OCCURRENCE
          SELECT 'VISIT_OCCURRENCE',
            COUNT(*),
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'DUPLICATE CHECK (EXCLUDING PRIMARY KEY)' AS CHECK_TYPE
          FROM (
            SELECT * EXCEPT(VISIT_OCCURRENCE_ID)
            FROM tgt_tbl_27
            GROUP BY ALL HAVING COUNT(*) > 1
          )

          UNION ALL

          -- VISIT_DETAIL
          SELECT 'VISIT_DETAIL',
            COUNT(*),
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'DUPLICATE CHECK (EXCLUDING PRIMARY KEY)' AS CHECK_TYPE
          FROM (
            SELECT * EXCEPT(VISIT_DETAIL_ID)
            FROM tgt_tbl_29
            GROUP BY ALL HAVING COUNT(*) > 1
          )

          UNION ALL

          -- CONDITION_OCCURRENCE
          SELECT 'CONDITION_OCCURRENCE',
            COUNT(*),
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'DUPLICATE CHECK (EXCLUDING PRIMARY KEY)' AS CHECK_TYPE
          FROM (
