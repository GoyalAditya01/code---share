      - check_id: 16
        check_type: data_validation
        check_name: data_validation_rule_check
        check_query: |
          WITH TABLE_COUNTS AS (
              SELECT 'TUMOR_EPISODE' AS TABLE_NAME, COUNT(*) AS TOTAL_RECORDS
              FROM tgt_tbl_60

              UNION ALL
              SELECT 'TUMOR_TREATMENT', COUNT(*)
              FROM tgt_tbl_62

              UNION ALL
              SELECT 'TUMOR_DIAGNOSIS', COUNT(*)
              FROM tgt_tbl_61

              UNION ALL
              SELECT 'PATHOLOGY_OCCURRENCE', COUNT(*)
              FROM tgt_tbl_63

              UNION ALL
              SELECT 'CANCER_MODIFIER', COUNT(*)
              FROM tgt_tbl_64

              UNION ALL
              SELECT 'GENOMIC_MEASUREMENT', COUNT(*)
              FROM tgt_tbl_65

              UNION ALL
              SELECT 'BIOMARKER_DETAIL', COUNT(*)
              FROM tgt_tbl_66
          ),

          CHECK_RESULTS AS (

              SELECT
                  'TUMOR_EPISODE' AS TABLE_NAME,
                  'EPISODE_START_DATE vs EPISODE_END_DATE' AS COLUMN_NAME,
                  COUNT(*) AS FAILED_RECORDS
              FROM tgt_tbl_60
              WHERE EPISODE_START_DATE IS NOT NULL
                AND EPISODE_END_DATE IS NOT NULL
                AND EPISODE_START_DATE > EPISODE_END_DATE

              UNION ALL

              SELECT
                  'TUMOR_TREATMENT',
                  'TREATMENT_START_DATE vs TREATMENT_END_DATE',
                  COUNT(*)
              FROM tgt_tbl_62
              WHERE TREATMENT_START_DATE IS NOT NULL
                AND TREATMENT_END_DATE IS NOT NULL
                AND TREATMENT_START_DATE > TREATMENT_END_DATE

              UNION ALL

              SELECT
                  'TUMOR_TREATMENT',
                  'TREATMENT_START >= EPISODE_START',
                  COUNT(*)
              FROM tgt_tbl_62 T
              JOIN tgt_tbl_60 E
                  ON T.TUMOR_EPISODE_ID = E.TUMOR_EPISODE_ID
              WHERE T.TREATMENT_START_DATE IS NOT NULL
                AND E.EPISODE_START_DATE IS NOT NULL
                AND T.TREATMENT_START_DATE < E.EPISODE_START_DATE

              UNION ALL

              SELECT
                  'TUMOR_TREATMENT',
                  'TREATMENT_END <= EPISODE_END',
                  COUNT(*)
              FROM tgt_tbl_62 T
              JOIN tgt_tbl_60 E
                  ON T.TUMOR_EPISODE_ID = E.TUMOR_EPISODE_ID
              WHERE T.TREATMENT_END_DATE IS NOT NULL
                AND E.EPISODE_END_DATE IS NOT NULL
                AND T.TREATMENT_END_DATE > E.EPISODE_END_DATE

              UNION ALL

              SELECT
                  'TUMOR_DIAGNOSIS',
                  'DIAGNOSIS_DATE within EPISODE range',
                  COUNT(*)
              FROM tgt_tbl_61 D
              JOIN tgt_tbl_60 E
                  ON D.TUMOR_EPISODE_ID = E.TUMOR_EPISODE_ID
              WHERE D.DIAGNOSIS_DATE IS NOT NULL
                AND E.EPISODE_START_DATE IS NOT NULL
                AND (
                      D.DIAGNOSIS_DATE < E.EPISODE_START_DATE
                      OR (
                          E.EPISODE_END_DATE IS NOT NULL
                          AND D.DIAGNOSIS_DATE > E.EPISODE_END_DATE
                      )
                    )

              UNION ALL

              SELECT
                  'PATHOLOGY_OCCURRENCE',
                  'PATHOLOGY_DATE within EPISODE range',
                  COUNT(*)
              FROM tgt_tbl_63 P
              JOIN tgt_tbl_60 E
                  ON P.TUMOR_EPISODE_ID = E.TUMOR_EPISODE_ID
              WHERE P.PATHOLOGY_DATE IS NOT NULL
                AND E.EPISODE_START_DATE IS NOT NULL
                AND (
                      P.PATHOLOGY_DATE < E.EPISODE_START_DATE
                      OR (
                          E.EPISODE_END_DATE IS NOT NULL
                          AND P.PATHOLOGY_DATE > E.EPISODE_END_DATE
                      )
                    )

              UNION ALL

              SELECT
                  'CANCER_MODIFIER',
                  'MODIFIER_DATE within EPISODE range',
                  COUNT(*)
              FROM tgt_tbl_64 M
              JOIN tgt_tbl_60 E
                  ON M.TUMOR_EPISODE_ID = E.TUMOR_EPISODE_ID
              WHERE M.MODIFIER_DATE IS NOT NULL
                AND E.EPISODE_START_DATE IS NOT NULL
                AND (
                      M.MODIFIER_DATE < E.EPISODE_START_DATE
                      OR (
                          E.EPISODE_END_DATE IS NOT NULL
                          AND M.MODIFIER_DATE > E.EPISODE_END_DATE
                      )
                    )

              UNION ALL

              SELECT
                  'GENOMIC_MEASUREMENT',
                  'MEASUREMENT_DATE plausibility',
                  COUNT(*)
              FROM tgt_tbl_65
              WHERE MEASUREMENT_DATE IS NOT NULL
                AND MEASUREMENT_DATE > CURRENT_DATE()

              UNION ALL

              SELECT
                  'BIOMARKER_DETAIL',
                  'SPECIMEN_RECEIVED_DATE vs RESULT_DATE',
                  COUNT(*)
              FROM tgt_tbl_66
              WHERE SPECIMEN_RECEIVED_DATE IS NOT NULL
                AND RESULT_DATE IS NOT NULL
                AND SPECIMEN_RECEIVED_DATE > RESULT_DATE

              UNION ALL

              SELECT
                  'BIOMARKER_DETAIL',
                  'SPECIMEN_COLLECTED_DATE vs SPECIMEN_RECEIVED_DATE',
                  COUNT(*)
              FROM tgt_tbl_66
              WHERE SPECIMEN_COLLECTED_DATE IS NOT NULL
                AND SPECIMEN_RECEIVED_DATE IS NOT NULL
                AND SPECIMEN_COLLECTED_DATE > SPECIMEN_RECEIVED_DATE
          )

          SELECT
              C.TABLE_NAME,
              C.COLUMN_NAME,
              T.TOTAL_RECORDS,
              C.FAILED_RECORDS,
              CASE
                  WHEN T.TOTAL_RECORDS = 0 THEN 'NO DATA'
                  WHEN C.FAILED_RECORDS > 0 THEN 'FAIL'
                  ELSE 'PASS'
              END AS STATUS,
              CASE
                  WHEN T.TOTAL_RECORDS = 0
                      THEN 'Validation not applicable because table is empty'
                  WHEN C.FAILED_RECORDS > 0
                      THEN 'Date sequencing violation records found'
                  ELSE 'Table has data and no date sequencing violations found'
              END AS VALIDATION_NOTE,
              'DATE VALIDATION CHECK' AS CHECK_TYPE
          FROM CHECK_RESULTS C
          JOIN TABLE_COUNTS T
              ON C.TABLE_NAME = T.TABLE_NAME
          ORDER BY
              C.TABLE_NAME,
              C.COLUMN_NAME;