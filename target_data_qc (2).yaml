          denominator.num_rows AS num_denominator_rows
          FROM (SELECT 
          MAX(violated_rows.violating_field) AS violating_field,
          COUNT(violated_rows.violating_field) AS num_violated_rows
          FROM
          (
          /*violatedRowsBegin*/
          SELECT 
          'VISIT_OCCURRENCE.VISIT_START_DATE' AS violating_field, 
          cdmTable.*
          FROM tgt_tbl_27 cdmTable
          JOIN tgt_tbl_24 plausibleTable 
          ON cdmTable.person_id = plausibleTable.person_id
          WHERE 
          COALESCE(
          IF(try_cast(plausibleTable.BIRTH_DATETIME  AS DATE) IS NULL, to_date(cast(plausibleTable.BIRTH_DATETIME  AS STRING), 'yyyyMMdd'), try_cast(plausibleTable.BIRTH_DATETIME  AS DATE)),
          IF(try_cast(CONCAT(plausibleTable.year_of_birth,'0601')  AS DATE) IS NULL, to_date(cast(CONCAT(plausibleTable.year_of_birth,'0601')  AS STRING), 'yyyyMMdd'), try_cast(CONCAT(plausibleTable.year_of_birth,'0601')  AS DATE))
          ) 
          > IF(try_cast(cdmTable.VISIT_START_DATE  AS DATE) IS NULL, to_date(cast(cdmTable.VISIT_START_DATE  AS STRING), 'yyyyMMdd'), try_cast(cdmTable.VISIT_START_DATE  AS DATE))
          /*violatedRowsEnd*/
          ) violated_rows
          ) violated_row_count cross join (SELECT 
          COUNT(*) AS num_rows
          FROM tgt_tbl_27 cdmTable
          ) denominator
          UNION ALL
          SELECT violating_field, num_violated_rows, 
          CASE 
          WHEN denominator.num_rows = 0 THEN 0 
          ELSE 1.0*num_violated_rows/denominator.num_rows 
          END AS pct_violated_rows, 
          denominator.num_rows AS num_denominator_rows
          FROM (SELECT 
          MAX(violated_rows.violating_field) AS violating_field,
          COUNT(violated_rows.violating_field) AS num_violated_rows
          FROM
          (
          /*violatedRowsBegin*/
          SELECT 
          'VISIT_OCCURRENCE.VISIT_START_DATETIME' AS violating_field, 
          cdmTable.*
          FROM tgt_tbl_27 cdmTable
          JOIN tgt_tbl_24 plausibleTable 
          ON cdmTable.person_id = plausibleTable.person_id
          WHERE 
          COALESCE(
          IF(try_cast(plausibleTable.BIRTH_DATETIME  AS DATE) IS NULL, to_date(cast(plausibleTable.BIRTH_DATETIME  AS STRING), 'yyyyMMdd'), try_cast(plausibleTable.BIRTH_DATETIME  AS DATE)),
          IF(try_cast(CONCAT(plausibleTable.year_of_birth,'0601')  AS DATE) IS NULL, to_date(cast(CONCAT(plausibleTable.year_of_birth,'0601')  AS STRING), 'yyyyMMdd'), try_cast(CONCAT(plausibleTable.year_of_birth,'0601')  AS DATE))
          ) 
          > IF(try_cast(cdmTable.VISIT_START_DATETIME  AS DATE) IS NULL, to_date(cast(cdmTable.VISIT_START_DATETIME  AS STRING), 'yyyyMMdd'), try_cast(cdmTable.VISIT_START_DATETIME  AS DATE))
          /*violatedRowsEnd*/
          ) violated_rows
          ) violated_row_count cross join (SELECT 
          COUNT(*) AS num_rows
          FROM tgt_tbl_27 cdmTable
          ) denominator
            ) q
          ) r

      - check_id: 27
        check_type: Plausibility
        check_name: measureObservationPeriodOverlap
        check_query: |
          SELECT
            r.num_violated_rows,
            r.pct_violated_rows,
            r.num_denominator_rows,
            r.execution_time,
            r.query_text,
            r.check_name,
            r.check_level,
            r.check_description,
            r.cdm_table_name,
            r.cdm_field_name,
            r.concept_id,
            r.unit_concept_id,
            r.sql_file,
            r.category,
            r.subcategory,
            r.context,
            r.warning,
            r.error,
            r.checkid,
            r.is_error,
            r.not_applicable,

            CASE
              WHEN r.pct_violated_rows > r.threshold_value THEN 1
              ELSE 0
            END AS failed,

            CASE
              WHEN r.pct_violated_rows <= r.threshold_value THEN 1
              ELSE 0
            END AS passed,

            r.not_applicable_reason,
            r.threshold_value,
            r.notes_value

          FROM (
            SELECT
              CAST(q.num_violated_rows AS BIGINT) AS num_violated_rows,
              CAST(q.pct_violated_rows AS DOUBLE) AS pct_violated_rows,
              CAST(q.num_denominator_rows AS BIGINT) AS num_denominator_rows,

              CAST(current_timestamp() AS STRING) AS execution_time,
              CAST(NULL AS STRING) AS query_text,

              'measureObservationPeriodOverlap' AS check_name,
              'TABLE' AS check_level,
              'The number and percent of persons with overlapping or directly adjacent observation period records.' AS check_description,

              'OBSERVATION_PERIOD' AS cdm_table_name,
              CAST(NULL AS STRING) AS cdm_field_name,

              CAST(NULL AS STRING) AS concept_id,
              CAST(NULL AS STRING) AS unit_concept_id,

              'measureObservationPeriodOverlap.sql' AS sql_file,
              'Plausibility' AS category,
              'Temporal' AS subcategory

              'OBSERVATION_PERIOD overlap or adjacent period check by PERSON_ID' AS context,

              CAST(NULL AS STRING) AS warning,
              CAST(NULL AS STRING) AS error,

              'dqd_measureObservationPeriodOverlap_OBSERVATION_PERIOD' AS checkid,

              0 AS is_error,
              0 AS not_applicable,

              CAST(NULL AS STRING) AS not_applicable_reason,
              CAST(0.5 AS DOUBLE) AS threshold_value,
              CAST(NULL AS STRING) AS notes_value

            FROM (
              -- paste your existing query here

          SELECT num_violated_rows, 
          CASE 
          WHEN denominator.num_rows = 0 THEN 0 
          ELSE 1.0*num_violated_rows/denominator.num_rows 
          END AS pct_violated_rows, 
          denominator.num_rows AS num_denominator_rows
          FROM (SELECT 
          COUNT(violated_rows.person_id) AS num_violated_rows
          FROM
          (
          /*violatedRowsBegin*/
          SELECT DISTINCT
          cdmTable.person_id 
          FROM tgt_tbl_25 cdmTable
          JOIN tgt_tbl_25 cdmTable2 
          ON cdmTable.person_id = cdmTable2.person_id
          AND cdmTable.observation_period_id != cdmTable2.observation_period_id
          WHERE (cdmTable.observation_period_start_date <= cdmTable2.observation_period_end_date 
          AND cdmTable.observation_period_end_date >= cdmTable2.observation_period_start_date)
          OR (DATEADD(day, 1, cdmTable.observation_period_end_date) = cdmTable2.observation_period_start_date)
          OR (DATEADD(day, 1, cdmTable2.observation_period_end_date) = cdmTable.observation_period_start_date)
          /*violatedRowsEnd*/
          ) violated_rows
          ) violated_row_count cross join (SELECT 
          COUNT(DISTINCT cdmTable.person_id) AS num_rows
          FROM tgt_tbl_25 cdmTable
          ) denominator
            ) q
          ) r
    
