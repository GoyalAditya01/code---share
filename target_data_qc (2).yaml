              CASE WHEN SUM(CASE WHEN EPISODE_START_DATE > CURRENT_DATE() THEN 1 ELSE 0 END) = 0 THEN 'PASS' ELSE 'FAIL' END,
              'FUTURE DATE VALIDATION' AS CHECK_TYPE
          FROM tgt_tbl_50

          UNION ALL SELECT '04','EPISODE_END_DATE','EPISODE',
              COUNT(*),
              SUM(CASE WHEN EPISODE_END_DATE > CURRENT_DATE() THEN 1 ELSE 0 END),
              CASE WHEN SUM(CASE WHEN EPISODE_END_DATE > CURRENT_DATE() THEN 1 ELSE 0 END) = 0 THEN 'PASS' ELSE 'FAIL' END,
              'FUTURE DATE VALIDATION' AS CHECK_TYPE
          FROM tgt_tbl_50

          ORDER BY TABLE_NAME, COLUMN_NAME;


      - check_id: 5
        check_type: accepted_values
        check_name: accepted_value_validation
        check_query: |
          -- ZIP: 3 digits only
          SELECT 'LOCATION', 'ZIP',
              'ZIP must be 3 digits',
              CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
              'ACCEPTED VALUES CHECK' AS CHECK_TYPE
          FROM tgt_tbl_21
          WHERE ZIP IS NOT NULL AND ZIP NOT RLIKE '^[0-9]{3}$'

          UNION ALL

          -- STATE: must be exactly 2 characters
          SELECT 'LOCATION', 'STATE',
              'State must be exactly 2 characters',
              CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
              'ACCEPTED VALUES CHECK' AS CHECK_TYPE
          FROM tgt_tbl_21
          WHERE STATE IS NOT NULL
            AND LENGTH(TRIM(STATE)) <> 2

          UNION ALL

          -- GENDER_CONCEPT_ID: 8507 (M), 8532 (F), or 0
          SELECT 'PERSON', 'GENDER_CONCEPT_ID',
              'Gender must be 8507, 8532, or 0',
              CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
              'ACCEPTED VALUES CHECK' AS CHECK_TYPE
          FROM tgt_tbl_24
          WHERE GENDER_CONCEPT_ID NOT IN (0, 8507, 8532)

          UNION ALL

          -- YEAR_OF_BIRTH: 1900 to current year
          SELECT 'PERSON', 'YEAR_OF_BIRTH',
              'Year of birth must be between 1900 and current year',
              CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
              'ACCEPTED VALUES CHECK' AS CHECK_TYPE
          FROM tgt_tbl_24
          WHERE YEAR_OF_BIRTH IS NOT NULL
            AND (YEAR_OF_BIRTH < 1900 OR YEAR_OF_BIRTH > YEAR(CURRENT_DATE()))

          UNION ALL

          -- MONTH_OF_BIRTH: 1-12
          SELECT 'PERSON', 'MONTH_OF_BIRTH',
              'Month of birth must be 1-12',
              CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
              'ACCEPTED VALUES CHECK' AS CHECK_TYPE
          FROM tgt_tbl_24
          WHERE MONTH_OF_BIRTH IS NOT NULL AND (MONTH_OF_BIRTH < 1 OR MONTH_OF_BIRTH > 12)

          UNION ALL

          -- DAY_OF_BIRTH: 1-31
          SELECT 'PERSON', 'DAY_OF_BIRTH',
              'Day of birth must be 1-31',
              CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
              'ACCEPTED VALUES CHECK' AS CHECK_TYPE
          FROM tgt_tbl_24
          WHERE DAY_OF_BIRTH IS NOT NULL AND (DAY_OF_BIRTH < 1 OR DAY_OF_BIRTH > 31)

          UNION ALL

          -- DAYS_SUPPLY: non-negative
          SELECT 'DRUG_EXPOSURE', 'DAYS_SUPPLY',
              'Days supply must be >= 0',
              CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
              'ACCEPTED VALUES CHECK' AS CHECK_TYPE
          FROM tgt_tbl_34
          WHERE DAYS_SUPPLY IS NOT NULL AND DAYS_SUPPLY < 0

          UNION ALL

          -- QUANTITY: non-negative
          SELECT 'DRUG_EXPOSURE', 'QUANTITY',
              'Quantity must be >= 0',
              CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
              'ACCEPTED VALUES CHECK' AS CHECK_TYPE
          FROM tgt_tbl_34
          WHERE QUANTITY IS NOT NULL AND QUANTITY < 0

