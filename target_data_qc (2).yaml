      - check_id: 10
        check_type: data_freshness
        check_name: data_freshness_validation
        check_query: |
          WITH SOURCE_MAX AS (

              SELECT
                  MAX(SOURCE_DATE) AS SOURCE_MAX_DATE
              FROM (

                  -- Pharmacy source service date
                  SELECT CAST(SVCDATE AS DATE) AS SOURCE_DATE
                  FROM src_tbl_2
                  WHERE SVCDATE IS NOT NULL

                  UNION ALL

                  -- Outpatient source service date
                  SELECT CAST(SVCDATE AS DATE)
                  FROM src_tbl_5
                  WHERE SVCDATE IS NOT NULL

                  UNION ALL

                  -- Inpatient service source service date
                  SELECT CAST(SVCDATE AS DATE)
                  FROM src_tbl_8
                  WHERE SVCDATE IS NOT NULL

                  UNION ALL

                  -- Inpatient summary admit date
                  SELECT CAST(ADMDATE AS DATE)
                  FROM src_tbl_4
                  WHERE ADMDATE IS NOT NULL

                  UNION ALL

                  -- Inpatient summary discharge date
                  SELECT CAST(DISDATE AS DATE)
                  FROM src_tbl_4
                  WHERE DISDATE IS NOT NULL
              )
          ),

          CDM_MAX AS (

              SELECT
                  MAX(CDM_DATE) AS CDM_MAX_DATE
              FROM (

                  SELECT CAST(VISIT_START_DATE AS DATE) AS CDM_DATE
                  FROM tgt_tbl_27
                  WHERE VISIT_START_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(VISIT_DETAIL_START_DATE AS DATE)
                  FROM tgt_tbl_29
                  WHERE VISIT_DETAIL_START_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(CONDITION_START_DATE AS DATE)
                  FROM tgt_tbl_32
                  WHERE CONDITION_START_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(DRUG_EXPOSURE_START_DATE AS DATE)
                  FROM tgt_tbl_34
                  WHERE DRUG_EXPOSURE_START_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(PROCEDURE_DATE AS DATE)
                  FROM tgt_tbl_36
                  WHERE PROCEDURE_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(DEVICE_EXPOSURE_START_DATE AS DATE)
                  FROM tgt_tbl_38
                  WHERE DEVICE_EXPOSURE_START_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(MEASUREMENT_DATE AS DATE)
                  FROM tgt_tbl_40
                  WHERE MEASUREMENT_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(OBSERVATION_DATE AS DATE)
                  FROM tgt_tbl_42
                  WHERE OBSERVATION_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(DEATH_DATE AS DATE)
                  FROM tgt_tbl_30
                  WHERE DEATH_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(DRUG_ERA_END_DATE AS DATE)
                  FROM tgt_tbl_53
                  WHERE DRUG_ERA_END_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(DOSE_ERA_END_DATE AS DATE)
                  FROM tgt_tbl_54
                  WHERE DOSE_ERA_END_DATE IS NOT NULL

                  UNION ALL

                  SELECT CAST(CONDITION_ERA_END_DATE AS DATE)
                  FROM tgt_tbl_52
                  WHERE CONDITION_ERA_END_DATE IS NOT NULL
              )
          )

          SELECT
              '10' AS CHECK_ID,
              'DATA FRESHNESS / LATENCY - SOURCE MAX DATE VS CDM MAX DATE' AS CHECK_NAME,
              S.SOURCE_MAX_DATE,
              C.CDM_MAX_DATE,
              DATEDIFF(S.SOURCE_MAX_DATE, C.CDM_MAX_DATE) AS DAYS_DIFFERENCE,
              CASE
                  WHEN S.SOURCE_MAX_DATE IS NULL AND C.CDM_MAX_DATE IS NULL THEN 'NO DATA'
                  WHEN S.SOURCE_MAX_DATE = C.CDM_MAX_DATE THEN 'MATCH'
                  ELSE 'DATE_GAP_REPORTED'
              END AS STATUS,
              CASE
                  WHEN S.SOURCE_MAX_DATE IS NULL AND C.CDM_MAX_DATE IS NULL
                      THEN 'No populated source or CDM dates found'
                  WHEN S.SOURCE_MAX_DATE = C.CDM_MAX_DATE
                      THEN 'Source and CDM max dates match'
                  WHEN C.CDM_MAX_DATE < S.SOURCE_MAX_DATE
                      THEN 'CDM max date is earlier than source max date; gap reported for latency review'
                  WHEN C.CDM_MAX_DATE > S.SOURCE_MAX_DATE
                      THEN 'CDM max date is later than source max date; gap reported for derivation/source-filter review'
                  ELSE 'Date comparison completed'
              END AS VALIDATION_NOTE,
              'DATA FRESHNESS' AS CHECK_TYPE
          FROM SOURCE_MAX S
          CROSS JOIN CDM_MAX C;

      - check_id: 11
        check_type: source_patient_id_collision
        check_name: source_patient_id_collision_detection
        check_query: |
          -- Rule 1: One PERSON_SOURCE_VALUE should map to exactly one PERSON_ID
          SELECT 'PERSON' AS TABLE_NAME,
            'PERSON_SOURCE_VALUE' AS COLUMN_NAME,
            'One source value must map to exactly one person_id' AS RULE,
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END AS STATUS,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM (
            SELECT PERSON_SOURCE_VALUE
            FROM tgt_tbl_24
            WHERE PERSON_SOURCE_VALUE IS NOT NULL
            GROUP BY PERSON_SOURCE_VALUE
            HAVING COUNT(DISTINCT PERSON_ID) > 1
          )

          UNION ALL

          -- Rule 2: One PERSON_ID should map to exactly one PERSON_SOURCE_VALUE
          SELECT 'PERSON',
            'PERSON_ID',
            'One person_id must map to exactly one source value',
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM (
            SELECT PERSON_ID
            FROM tgt_tbl_24
            WHERE PERSON_SOURCE_VALUE IS NOT NULL
            GROUP BY PERSON_ID
            HAVING COUNT(DISTINCT PERSON_SOURCE_VALUE) > 1
          )

          UNION ALL

          -- Rule 3: No NULL PERSON_SOURCE_VALUE
          SELECT 'PERSON',
            'PERSON_SOURCE_VALUE',
            'person_source_value must not be null',
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM tgt_tbl_24
          WHERE PERSON_SOURCE_VALUE IS NULL

          UNION ALL

          -- Rule 4: PERSON_ID referenced in clinical tables must exist in PERSON
          SELECT 'VISIT_OCCURRENCE',
            'PERSON_ID',
            'All person_ids must exist in PERSON table',
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM tgt_tbl_27 v
          WHERE NOT EXISTS (
            SELECT 1 FROM tgt_tbl_24 p
            WHERE p.PERSON_ID = v.PERSON_ID
          )

          UNION ALL

          SELECT 'CONDITION_OCCURRENCE',
            'PERSON_ID',
            'All person_ids must exist in PERSON table',
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM tgt_tbl_32 c
          WHERE NOT EXISTS (
            SELECT 1 FROM tgt_tbl_24 p
            WHERE p.PERSON_ID = c.PERSON_ID
          )

          UNION ALL

          SELECT 'DRUG_EXPOSURE',
            'PERSON_ID',
            'All person_ids must exist in PERSON table',
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM tgt_tbl_34 d
          WHERE NOT EXISTS (
            SELECT 1 FROM tgt_tbl_24 p
            WHERE p.PERSON_ID = d.PERSON_ID
          )

          UNION ALL

          SELECT 'PROCEDURE_OCCURRENCE',
            'PERSON_ID',
            'All person_ids must exist in PERSON table',
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM tgt_tbl_36 pr
          WHERE NOT EXISTS (
            SELECT 1 FROM tgt_tbl_24 p
            WHERE p.PERSON_ID = pr.PERSON_ID
          )

          UNION ALL

          SELECT 'MEASUREMENT',
            'PERSON_ID',
            'All person_ids must exist in PERSON table',
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM tgt_tbl_40 m
          WHERE NOT EXISTS (
            SELECT 1 FROM tgt_tbl_24 p
            WHERE p.PERSON_ID = m.PERSON_ID
          )

          UNION ALL

          SELECT 'OBSERVATION',
            'PERSON_ID',
            'All person_ids must exist in PERSON table',
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM tgt_tbl_42 o
          WHERE NOT EXISTS (
            SELECT 1 FROM tgt_tbl_24 p
            WHERE p.PERSON_ID = o.PERSON_ID
          )

          UNION ALL

          SELECT 'DEVICE_EXPOSURE',
            'PERSON_ID',
            'All person_ids must exist in PERSON table',
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM tgt_tbl_38 de
          WHERE NOT EXISTS (
            SELECT 1 FROM tgt_tbl_24 p
            WHERE p.PERSON_ID = de.PERSON_ID
          )

          UNION ALL

          SELECT 'DEATH',
            'PERSON_ID',
            'All person_ids must exist in PERSON table',
            CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
            'PATIENT ID COLLISION CHECK' AS CHECK_TYPE
          FROM tgt_tbl_30 dt
          WHERE NOT EXISTS (
            SELECT 1 FROM tgt_tbl_24 p
            WHERE p.PERSON_ID = dt.PERSON_ID
          )

          ORDER BY TABLE_NAME, COLUMN_NAME;


