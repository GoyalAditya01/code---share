      - check_id: 3
        check_type: patient_coverage
        check_name: patient_coverage_validation
        check_query: |
          WITH
          ENROLL_PATIENTS AS (
              SELECT DISTINCT
                  CAST(ENROLID AS STRING) AS SOURCE_PATIENT_ID
              FROM src_tbl_1
              WHERE ENROLID IS NOT NULL
          ),

          CDM_PATIENTS AS (
              SELECT DISTINCT
                  CAST(PERSON_SOURCE_VALUE AS STRING) AS PERSON_SOURCE_VALUE
              FROM tgt_tbl_24
              WHERE PERSON_SOURCE_VALUE IS NOT NULL
          ),

          MISSING AS (
              SELECT
                  E.SOURCE_PATIENT_ID
              FROM ENROLL_PATIENTS E
              LEFT JOIN CDM_PATIENTS C
                  ON E.SOURCE_PATIENT_ID = C.PERSON_SOURCE_VALUE
              WHERE C.PERSON_SOURCE_VALUE IS NULL
          ),

          SUMMARY AS (
              SELECT
                  (SELECT COUNT(*) FROM ENROLL_PATIENTS) AS T_ENROLL_VALID_PATIENT_COUNT,
                  (SELECT COUNT(*) FROM CDM_PATIENTS) AS PERSON_TABLE_COUNT,
                  (SELECT COUNT(*) FROM MISSING) AS MISSING_FROM_CDM
          )

          SELECT
              T_ENROLL_VALID_PATIENT_COUNT,
              PERSON_TABLE_COUNT,
              MISSING_FROM_CDM,
              ROUND(
                  MISSING_FROM_CDM * 100.0 / T_ENROLL_VALID_PATIENT_COUNT,
                  8
              ) AS MISSING_PERCENT,
              CASE
                  WHEN MISSING_FROM_CDM * 100.0 / T_ENROLL_VALID_PATIENT_COUNT < 0.1
                      THEN 'PASS'
                  ELSE 'FAIL'
              END AS STATUS,
              'NULL ENROLID values excluded because they are not valid source patient identifiers' AS VALIDATION_NOTE,
              'SOURCE VS OMOP PATIENT COVERAGE' AS CHECK_TYPE
          FROM SUMMARY;

      - check_id: 4
        check_type: future_dates
        check_name: future_date_validation
        check_query: |
          SELECT '04' AS CHECK_ID, 'OBSERVATION_PERIOD_START_DATE' AS COLUMN_NAME,
              'OBSERVATION_PERIOD' AS TABLE_NAME,
              COUNT(*) AS TOTAL_RECORDS,
              SUM(CASE WHEN OBSERVATION_PERIOD_START_DATE > CURRENT_DATE() THEN 1 ELSE 0 END) AS FAILED_RECORDS,
              CASE WHEN SUM(CASE WHEN OBSERVATION_PERIOD_START_DATE > CURRENT_DATE() THEN 1 ELSE 0 END) = 0 THEN 'PASS' ELSE 'FAIL' END AS STATUS,
              'FUTURE DATE VALIDATION' AS CHECK_TYPE
