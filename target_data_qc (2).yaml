      - check_id: 47
        check_type: data_profiling
        check_name: vmqi0eiitempResults_213
        check_query: |
          WITH rawData(stratum_id, count_value) AS (
          select visit_concept_id AS stratum_id, datediff(day,visit_start_date,visit_end_date) as count_value
          from tgt_tbl_27 vo inner join
