            FROM (
              SELECT 
          COUNT(*) AS num_rows
          FROM pre_req_tbl_8 cdmTable
            ) den
            CROSS JOIN (
              SELECT
                COALESCE(SUM(CASE WHEN co.concept_id != 0 
          AND (co.concept_class_id != 'Ingredient') THEN 1 ELSE 0 END), 0) AS v_1_drug_strength_ingredient_concept_id
              FROM pre_req_tbl_8 cdmTable
          LEFT JOIN pre_req_tbl_1 co
