      - check_id: 21
        check_type: Plausibility
        check_name: plausibleGenderUseDescendants
        check_query: |
          SELECT
            r.num_violated_rows,
            r.pct_violated_rows,
            r.num_denominator_rows,
            r.execution_time,
            r.query_text,
            r.check_name,
            r.check_level,
            r.check_description,
            r.cdm_table_name,
            r.cdm_field_name,
            r.concept_id,
            r.unit_concept_id,
            r.sql_file,
            r.category,
            r.subcategory,
            r.context,
            r.warning,
            r.error,
            r.checkid,
            r.is_error,
            r.not_applicable,

            CASE
              WHEN r.pct_violated_rows > r.threshold_value THEN 1
              ELSE 0
            END AS failed,

            CASE
              WHEN r.pct_violated_rows <= r.threshold_value THEN 1
              ELSE 0
            END AS passed,

            r.not_applicable_reason,
            r.threshold_value,
            r.notes_value

          FROM (
            SELECT
              CAST(q.num_violated_rows AS BIGINT) AS num_violated_rows,
              CAST(q.pct_violated_rows AS DOUBLE) AS pct_violated_rows,
              CAST(q.num_denominator_rows AS BIGINT) AS num_denominator_rows,

              CAST(current_timestamp() AS STRING) AS execution_time,
              CAST(NULL AS STRING) AS query_text,

              'plausibleGenderUseDescendants' AS check_name,
              'FIELD' AS check_level,
              'The number and percent of records with a condition or procedure concept that is not plausible for the person gender.' AS check_description,

              q.violating_field AS cdm_table_name,

              CASE
                WHEN q.violating_field = 'CONDITION_OCCURRENCE' THEN 'CONDITION_CONCEPT_ID'
                WHEN q.violating_field = 'PROCEDURE_OCCURRENCE' THEN 'PROCEDURE_CONCEPT_ID'
                ELSE NULL
              END AS cdm_field_name,

              CAST(q.violating_concept_id AS STRING) AS concept_id,
              CAST(NULL AS STRING) AS unit_concept_id,

              'plausibleGenderUseDescendants.sql' AS sql_file,
              'Plausibility' AS category,
              'Atemporal' AS subcategory,

              CONCAT(
                q.violating_field,
                '.',
                CASE
                  WHEN q.violating_field = 'CONDITION_OCCURRENCE' THEN 'CONDITION_CONCEPT_ID'
                  WHEN q.violating_field = 'PROCEDURE_OCCURRENCE' THEN 'PROCEDURE_CONCEPT_ID'
                  ELSE 'CONCEPT_ID'
                END,
                '=',
                CAST(q.violating_concept_id AS STRING)
              ) AS context,

              CAST(NULL AS STRING) AS warning,
              CAST(NULL AS STRING) AS error,

              CONCAT(
                'dqd_plausibleGenderUseDescendants_',
                q.violating_field,
                '_',
                REGEXP_REPLACE(CAST(q.violating_concept_id AS STRING), '[^0-9A-Za-z]+', '_')
              ) AS checkid,

              0 AS is_error,
              0 AS not_applicable,

              CAST(NULL AS STRING) AS not_applicable_reason,
              CAST(0.5 AS DOUBLE) AS threshold_value,
              CAST(NULL AS STRING) AS notes_value

            FROM (
          WITH
          gender_desc_rules(rule_id, violating_field, violating_concept_id, expected_gender_concept_id) AS (
            VALUES
              (1, 'CONDITION_OCCURRENCE', '4090861, 4025213', 8507),
              (2, 'CONDITION_OCCURRENCE', '4095793, 443343, 4024004, 4172857, 444094, 197810, 4158481', 8532),
              (3, 'PROCEDURE_OCCURRENCE', '4041261', 8532),
              (4, 'PROCEDURE_OCCURRENCE', '4250917, 4077750, 4043199, 4040577', 8507)
          ),
          gender_desc_ancestors(rule_id, ancestor_concept_id) AS (
            VALUES
              (1, 4090861),
              (1, 4025213),
              (2, 4095793),
              (2, 443343),
              (2, 4024004),
              (2, 4172857),
              (2, 444094),
              (2, 197810),
              (2, 4158481),
              (3, 4041261),
              (4, 4250917),
              (4, 4077750),
              (4, 4043199),
              (4, 4040577)
          ),
          condition_denominator AS (
            SELECT r.rule_id, r.violating_field, r.violating_concept_id, COUNT(c.CONDITION_CONCEPT_ID) AS num_denominator_rows
            FROM gender_desc_rules r
            JOIN gender_desc_ancestors a ON r.rule_id = a.rule_id
            LEFT JOIN pre_req_tbl_2 ca ON ca.ancestor_concept_id = a.ancestor_concept_id
            LEFT JOIN tgt_tbl_32 c ON c.CONDITION_CONCEPT_ID = ca.descendant_concept_id
            WHERE r.violating_field = 'CONDITION_OCCURRENCE'
            GROUP BY r.rule_id, r.violating_field, r.violating_concept_id
          ),
          procedure_denominator AS (
            SELECT r.rule_id, r.violating_field, r.violating_concept_id, COUNT(pr.PROCEDURE_CONCEPT_ID) AS num_denominator_rows
            FROM gender_desc_rules r
            JOIN gender_desc_ancestors a ON r.rule_id = a.rule_id
            LEFT JOIN pre_req_tbl_2 ca ON ca.ancestor_concept_id = a.ancestor_concept_id
            LEFT JOIN tgt_tbl_36 pr ON pr.PROCEDURE_CONCEPT_ID = ca.descendant_concept_id
            WHERE r.violating_field = 'PROCEDURE_OCCURRENCE'
            GROUP BY r.rule_id, r.violating_field, r.violating_concept_id
          ),
          condition_violations AS (
            SELECT r.rule_id, r.violating_field, r.violating_concept_id, COUNT(c.CONDITION_CONCEPT_ID) AS num_violated_rows
            FROM gender_desc_rules r
            JOIN gender_desc_ancestors a ON r.rule_id = a.rule_id
            JOIN pre_req_tbl_2 ca ON ca.ancestor_concept_id = a.ancestor_concept_id
            JOIN tgt_tbl_32 c ON c.CONDITION_CONCEPT_ID = ca.descendant_concept_id
            JOIN tgt_tbl_24 p ON c.person_id = p.person_id
            WHERE r.violating_field = 'CONDITION_OCCURRENCE'
              AND p.gender_concept_id <> r.expected_gender_concept_id
            GROUP BY r.rule_id, r.violating_field, r.violating_concept_id
          ),
          procedure_violations AS (
            SELECT r.rule_id, r.violating_field, r.violating_concept_id, COUNT(pr.PROCEDURE_CONCEPT_ID) AS num_violated_rows
            FROM gender_desc_rules r
            JOIN gender_desc_ancestors a ON r.rule_id = a.rule_id
            JOIN pre_req_tbl_2 ca ON ca.ancestor_concept_id = a.ancestor_concept_id
            JOIN tgt_tbl_36 pr ON pr.PROCEDURE_CONCEPT_ID = ca.descendant_concept_id
            JOIN tgt_tbl_24 p ON pr.person_id = p.person_id
            WHERE r.violating_field = 'PROCEDURE_OCCURRENCE'
              AND p.gender_concept_id <> r.expected_gender_concept_id
            GROUP BY r.rule_id, r.violating_field, r.violating_concept_id
          ),
          all_denominator AS (SELECT * FROM condition_denominator UNION ALL SELECT * FROM procedure_denominator),
          all_violations AS (SELECT * FROM condition_violations UNION ALL SELECT * FROM procedure_violations)
          SELECT
            d.violating_field,
            d.violating_concept_id,
            CAST(COALESCE(v.num_violated_rows, 0) AS BIGINT) AS num_violated_rows,
            CASE WHEN d.num_denominator_rows = 0 THEN 0 ELSE 1.0 * COALESCE(v.num_violated_rows, 0) / d.num_denominator_rows END AS pct_violated_rows,
            CAST(d.num_denominator_rows AS BIGINT) AS num_denominator_rows
          FROM all_denominator d
          LEFT JOIN all_violations v
            ON d.rule_id = v.rule_id
          ) q
          ) r


