      - check_id: 14
        check_type: Completeness
        check_name: standardConceptRecordCompleteness
        check_query: |
          SELECT
            r.num_violated_rows,
            r.pct_violated_rows,
            r.num_denominator_rows,
            r.execution_time,
            r.query_text,
            r.check_name,
            r.check_level,
            r.check_description,
            r.cdm_table_name,
            r.cdm_field_name,
            r.concept_id,
            r.unit_concept_id,
            r.sql_file,
            r.category,
            r.subcategory,
            r.context,
            r.warning,
            r.error,
            r.checkid,
            r.is_error,
            r.not_applicable,

            CASE
              WHEN r.pct_violated_rows > r.threshold_value THEN 1
              ELSE 0
            END AS failed,

            CASE
              WHEN r.pct_violated_rows <= r.threshold_value THEN 1
              ELSE 0
            END AS passed,

            r.not_applicable_reason,
            r.threshold_value,
            r.notes_value

          FROM (
            SELECT
              CAST(q.num_violated_rows AS BIGINT) AS num_violated_rows,
              CAST(q.pct_violated_rows AS DOUBLE) AS pct_violated_rows,
              CAST(q.num_denominator_rows AS BIGINT) AS num_denominator_rows,

              CAST(current_timestamp() AS STRING) AS execution_time,
              CAST(NULL AS STRING) AS query_text,

              'standardConceptRecordCompleteness' AS check_name,
              'FIELD' AS check_level,
              'The number and percent of records with a value of 0 in a *_concept_id field, indicating source value present but not mapped to a standard concept.' AS check_description,

              SPLIT(q.violating_field, '\\.')[0] AS cdm_table_name,
              SPLIT(q.violating_field, '\\.')[1] AS cdm_field_name,

              CAST(NULL AS STRING) AS concept_id,
              CAST(NULL AS STRING) AS unit_concept_id,

              'standardConceptRecordCompleteness.sql' AS sql_file,
              'Completeness' AS category,
              CAST(NULL AS STRING) AS subcategory,

              q.violating_field AS context,

              CAST(NULL AS STRING) AS warning,
              CAST(NULL AS STRING) AS error,

              CONCAT(
                'dqd_standardConceptRecordCompleteness_',
                REPLACE(q.violating_field, '.', '_')
              ) AS checkid,

              0 AS is_error,
              0 AS not_applicable,

              CAST(NULL AS STRING) AS not_applicable_reason,
              CAST(0.5 AS DOUBLE) AS threshold_value,
              CAST(NULL AS STRING) AS notes_value

            FROM (
          WITH
          optimized_group_1 AS (
            SELECT
              den.num_rows,
              agg.v_1_care_site_place_of_service_concept_id
            FROM (
              SELECT COUNT(*) AS num_rows
          FROM tgt_tbl_22 cdmTable
          WHERE (cdmTable.PLACE_OF_SERVICE_CONCEPT_ID IS NOT NULL
          OR cdmTable.place_of_service_source_value IS NOT NULL
          )
