      - check_id: 9
        check_type: Conformance
        check_name: fkClass
        check_query: |
          SELECT
            r.num_violated_rows,
            r.pct_violated_rows,
            r.num_denominator_rows,
            r.execution_time,
            r.query_text,
            r.check_name,
            r.check_level,
            r.check_description,
            r.cdm_table_name,
            r.cdm_field_name,
            r.concept_id,
            r.unit_concept_id,
            r.sql_file,
            r.category,
            r.subcategory,
            r.context,
            r.warning,
            r.error,
            r.checkid,
            r.is_error,
            r.not_applicable,

            CASE
              WHEN r.pct_violated_rows > r.threshold_value THEN 1
              ELSE 0
            END AS failed,

            CASE
              WHEN r.pct_violated_rows <= r.threshold_value THEN 1
              ELSE 0
            END AS passed,

            r.not_applicable_reason,
            r.threshold_value,
            r.notes_value

          FROM (
            SELECT
              CAST(q.num_violated_rows AS BIGINT) AS num_violated_rows,
              CAST(q.pct_violated_rows AS DOUBLE) AS pct_violated_rows,
              CAST(q.num_denominator_rows AS BIGINT) AS num_denominator_rows,

              CAST(current_timestamp() AS STRING) AS execution_time,
              CAST(NULL AS STRING) AS query_text,

              'fkClass' AS check_name,
              'FIELD' AS check_level,
              'The number and percent of records where a foreign key concept does not belong to the expected concept class.' AS check_description,

              SPLIT(q.violating_field, '\\.')[0] AS cdm_table_name,
              SPLIT(q.violating_field, '\\.')[1] AS cdm_field_name,

              CAST(NULL AS STRING) AS concept_id,
              CAST(NULL AS STRING) AS unit_concept_id,

              'fkClass.sql' AS sql_file,
              'Conformance' AS category,
              'Relational' AS subcategory,

              CONCAT(q.violating_field, ' expected concept_class_id=Ingredient') AS context,

              CAST(NULL AS STRING) AS warning,
              CAST(NULL AS STRING) AS error,

              CONCAT(
                'dqd_fkClass_',
                REPLACE(q.violating_field, '.', '_'),
                '_Ingredient'
              ) AS checkid,

              0 AS is_error,
              0 AS not_applicable,

              CAST(NULL AS STRING) AS not_applicable_reason,
              CAST(0.5 AS DOUBLE) AS threshold_value,
              CAST(NULL AS STRING) AS notes_value

            FROM (
          WITH
          optimized_group_1 AS (
            SELECT
              den.num_rows,
              agg.v_1_dose_era_drug_concept_id
            FROM (
              SELECT 
          COUNT(*) AS num_rows
          FROM tgt_tbl_54 cdmTable
            ) den
            CROSS JOIN (
              SELECT
                COALESCE(SUM(CASE WHEN co.concept_id != 0 
          AND (co.concept_class_id != 'Ingredient') THEN 1 ELSE 0 END), 0) AS v_1_dose_era_drug_concept_id
              FROM tgt_tbl_54 cdmTable
          LEFT JOIN pre_req_tbl_1 co
          ON cdmTable.DRUG_CONCEPT_ID = co.concept_id
            ) agg
          ),
          optimized_group_2 AS (
            SELECT
              den.num_rows,
              agg.v_1_drug_era_drug_concept_id
            FROM (
              SELECT 
          COUNT(*) AS num_rows
          FROM tgt_tbl_53 cdmTable
            ) den
            CROSS JOIN (
              SELECT
                COALESCE(SUM(CASE WHEN co.concept_id != 0 
          AND (co.concept_class_id != 'Ingredient') THEN 1 ELSE 0 END), 0) AS v_1_drug_era_drug_concept_id
              FROM tgt_tbl_53 cdmTable
          LEFT JOIN pre_req_tbl_1 co
          ON cdmTable.DRUG_CONCEPT_ID = co.concept_id
            ) agg
          ),
          optimized_group_3 AS (
            SELECT
              den.num_rows,
