            r.execution_time,
            r.query_text,
            r.check_name,
            r.check_level,
            r.check_description,
            r.cdm_table_name,
            r.cdm_field_name,
            r.concept_id,
            r.unit_concept_id,
            r.sql_file,
            r.category,
            r.subcategory,
            r.context,
            r.warning,
            r.error,
            r.checkid,
            r.is_error,
            r.not_applicable,

            CASE
              WHEN r.pct_violated_rows > r.threshold_value THEN 1
              ELSE 0
            END AS failed,

            CASE
              WHEN r.pct_violated_rows <= r.threshold_value THEN 1
              ELSE 0
            END AS passed,

            r.not_applicable_reason,
