    qc_check_list: 
      - check_id: 1  
        check_type: Plausibility
        check_name: withinVisitDates
        check_query: |          
          SELECT
            r.num_violated_rows,
            r.pct_violated_rows,
            r.num_denominator_rows,
            r.execution_time,
            r.query_text,
            r.check_name,
            r.check_level,
            r.check_description,
            r.cdm_table_name,
            r.cdm_field_name,
            r.concept_id,
            r.unit_concept_id,
            r.sql_file,
            r.category,
            r.subcategory,
            r.context,
            r.warning,
            r.error,
            r.checkid,
            r.is_error,
            r.not_applicable,

            CASE
              WHEN r.pct_violated_rows > r.threshold_value THEN 1
              ELSE 0
            END AS failed,

            CASE
              WHEN r.pct_violated_rows <= r.threshold_value THEN 1
              ELSE 0
            END AS passed,

            r.not_applicable_reason,
            r.threshold_value,
            r.notes_value

          FROM (
            SELECT
              CAST(q.num_violated_rows AS BIGINT) AS num_violated_rows,
              CAST(q.pct_violated_rows AS DOUBLE) AS pct_violated_rows,
              CAST(q.num_denominator_rows AS BIGINT) AS num_denominator_rows,

              CAST(current_timestamp() AS STRING) AS execution_time,
              CAST(NULL AS STRING) AS query_text,

              'withinVisitDates' AS check_name,
              'FIELD' AS check_level,
              'The number and percent of clinical-event records whose start date does not fall between the visit_start_date and visit_end_date of their referenced visit.' AS check_description,

              SPLIT(q.violating_field, '\\.')[0] AS cdm_table_name,
              SPLIT(q.violating_field, '\\.')[1] AS cdm_field_name,

              CAST(NULL AS STRING) AS concept_id,
              CAST(NULL AS STRING) AS unit_concept_id,

              'withinVisitDates.sql' AS sql_file,
              'Plausibility' AS category,
              'Temporal' AS subcategory,

              q.violating_field AS context,

              CAST(NULL AS STRING) AS warning,
              CAST(NULL AS STRING) AS error,

              CONCAT(
                'dqd_withinVisitDates_',
                REPLACE(q.violating_field, '.', '_')
              ) AS checkid,

              0 AS is_error,
              0 AS not_applicable,

              CAST(NULL AS STRING) AS not_applicable_reason,
              CAST(0.5 AS DOUBLE) AS threshold_value,
              CAST(NULL AS STRING) AS notes_value

            FROM (
