          UNION ALL

          -- PROCEDURE_OCCURRENCE: if end_date populated, start_date must exist
          SELECT 'PROCEDURE_OCCURRENCE', 'PROCEDURE_DATE',
              'If end_date populated then start_date must exist',
              CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
              'CONDITIONAL COMPLETENESS CHECK' AS CHECK_TYPE
          FROM tgt_tbl_36
          WHERE PROCEDURE_END_DATE IS NOT NULL AND PROCEDURE_DATE IS NULL

          UNION ALL

          -- PROCEDURE_OCCURRENCE: if visit_detail_id populated, visit_occurrence_id must exist
          SELECT 'PROCEDURE_OCCURRENCE', 'VISIT_OCCURRENCE_ID',
              'If visit_detail_id populated then visit_occurrence_id must exist',
              CASE WHEN COUNT(*) > 0 THEN 'FAIL' ELSE 'PASS' END,
              'CONDITIONAL COMPLETENESS CHECK' AS CHECK_TYPE
          FROM tgt_tbl_36
          WHERE VISIT_DETAIL_ID IS NOT NULL AND VISIT_OCCURRENCE_ID IS NULL

          UNION ALL

          -- DEVICE_EXPOSURE: if end_date populated, start_date must exist
          SELECT 'DEVICE_EXPOSURE', 'DEVICE_EXPOSURE_START_DATE',
