          FROM tgt_tbl_36 pr
          WHERE NOT EXISTS (
            SELECT 1 FROM tgt_tbl_24 p
            WHERE p.PERSON_ID = pr.PERSON_ID
          )

          UNION ALL

          SELECT 'MEASUREMENT',
