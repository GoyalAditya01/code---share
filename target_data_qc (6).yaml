            CROSS JOIN (
              SELECT
                COALESCE(SUM(CASE WHEN cdmTable.PLACE_OF_SERVICE_CONCEPT_ID = 0
          OR (cdmTable.PLACE_OF_SERVICE_CONCEPT_ID IS NULL AND cdmTable.place_of_service_source_value IS NOT NULL) THEN 1 ELSE 0 END), 0) AS v_1_care_site_place_of_service_concept_id
